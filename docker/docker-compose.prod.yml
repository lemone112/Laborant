# Production stack for Dokploy / Docker Swarm
version: "3.8"

services:
  api:
    image: ai-code-review:latest
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 3
    env_file: .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - temporal
      - neo4j
      - qdrant
      - postgres
    networks:
      - internal

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-changeme}
      - POSTGRES_SEEDS=postgres
    volumes:
      - temporal-data:/var/lib/temporal
    networks:
      - internal

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j-data:/data
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${TEMPORAL_DB_USER:-temporal}
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-changeme}
      POSTGRES_DB: ${TEMPORAL_DB_NAME:-temporal}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  temporal-data:
  neo4j-data:
  qdrant-data:
  pg-data:

networks:
  internal:
    driver: overlay
