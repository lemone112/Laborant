# Laborant — Local development stack
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    env_file: ../.env
    depends_on:
      - temporal
    command: ["node", "dist/main.js"]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    depends_on:
      - temporal
    command: ["node", "dist/worker.js"]

  mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    command: ["node", "dist/mcp/server.js"]
    stdin_open: true

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres

  # Optional — uncomment if you need dependency graph
  # neo4j:
  #   image: neo4j:5-community
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   environment:
  #     NEO4J_AUTH: neo4j/changeme
  #   volumes:
  #     - neo4j-data:/data

  # Optional — uncomment if you need semantic code search
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant-data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data:
  # neo4j-data:
  # qdrant-data:
